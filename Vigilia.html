<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Rincón Literario — cuaderno de poesía</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Italianno&family=Cormorant+SC:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body { margin: 0; padding: 0; width: 100%; min-height: 100%; overflow: hidden; }
    body { background: #2a2520; font-family: 'EB Garamond', Georgia, serif; }
    #root { width: 100vw; height: 100vh; height: 100svh; overflow: hidden; }

    /* ─────────────────────────────────────────────────────────
       BOOK — shared structure
       ───────────────────────────────────────────────────────── */
    .book {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      outline: none;
      user-select: none;
      --spread-w: 1040px;
      --spread-h: 680px;
      --page-w: 520px;
    }
    .book__ambient {
      position: absolute; inset: 0;
      background: var(--ambient);
      z-index: 0;
    }

    .book__stage {
      position: absolute; inset: 0;
      overflow: hidden;
      perspective: 2400px;
      perspective-origin: 50% 50%;
      z-index: 1;
    }

    .book__spread {
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--spread-w);
      height: var(--spread-h);
      transform-style: preserve-3d;
      cursor: grab;
      transform: translate(-50%, -50%) scale(var(--book-scale, 1));
      transform-origin: center center;
    }
    .book__spread:active { cursor: grabbing; }

    /* Hard-cover boards behind the pages */
    .book__cover {
      position: absolute;
      top: -22px; bottom: -22px;
      width: calc(var(--page-w) + 18px);
      background: var(--cover-bg);
      border: 1px solid var(--cover-edge);
      box-shadow:
        inset 0 0 0 1px var(--cover-emboss),
        inset 0 0 40px rgba(0,0,0,.4),
        0 30px 60px -20px rgba(0,0,0,.6);
      z-index: 0;
    }
    .book__cover--left {
      left: -18px;
      border-radius: 6px 2px 2px 6px;
    }
    .book__cover--right {
      right: -18px;
      border-radius: 2px 6px 6px 2px;
    }
    .book__cover::after {
      /* decorative inner border on the cover edge */
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid var(--cover-line);
      border-radius: 2px;
      opacity: .55;
      pointer-events: none;
    }

    /* Inside-cover background pages (visible when current=0 or N) */
    .book__inside-cover {
      position: absolute;
      top: 0;
      width: var(--page-w);
      height: var(--spread-h);
      background: var(--page-bg);
      background-image: var(--page-tex);
      z-index: 1;
    }
    .book__inside-cover--front {
      left: 0;
      box-shadow:
        inset -30px 0 50px -20px rgba(0,0,0,.18),
        inset 0 0 80px rgba(0,0,0,.05);
    }
    .book__inside-cover--back {
      right: 0;
      box-shadow:
        inset 30px 0 50px -20px rgba(0,0,0,.18),
        inset 0 0 80px rgba(0,0,0,.05);
    }

    /* Binding (spine shadow in center) */
    .book__binding {
      position: absolute;
      left: calc(50% - 14px);
      top: 0; bottom: 0;
      width: 28px;
      background: linear-gradient(
        90deg,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,.18) 30%,
        rgba(0,0,0,.32) 50%,
        rgba(0,0,0,.18) 70%,
        rgba(0,0,0,0) 100%
      );
      z-index: 200;
      pointer-events: none;
    }
    .book__binding-shadow-left,
    .book__binding-shadow-right {
      position: absolute;
      top: 0; bottom: 0;
      width: 80px;
      z-index: 199;
      pointer-events: none;
    }
    .book__binding-shadow-left {
      left: 50%;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(0,0,0,.10));
    }
    .book__binding-shadow-right {
      left: 50%;
      background: linear-gradient(90deg, rgba(0,0,0,.10), transparent);
    }

    /* Leaves stack — each leaf has 2 faces and flips on click */
    .book__leaves {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
    }

    .book__leaf {
      position: absolute;
      top: 0;
      left: 50%;
      width: var(--page-w);
      height: var(--spread-h);
      transform-style: preserve-3d;
      transform-origin: 0% 50%;
      transform: rotateY(0deg);
      transition-property: transform;
      transition-timing-function: cubic-bezier(.42, .08, .34, 1);
      will-change: transform;
    }
    .book__leaf.is-flipped {
      transform: rotateY(-180deg);
    }
    /* gentle resting lift on the topmost unflipped leaf — the user said
       "ligeramente se va la página de la derecha" */
    .book__leaf.is-hint {
      transform: rotateY(-6deg) translateZ(2px);
    }
    .book__spread:hover .book__leaf:not(.is-flipped):not(.is-animating):first-of-type {
      /* no-op anchor for future */
    }

    .book__face {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: var(--page-bg);
      background-image: var(--page-tex);
      box-shadow:
        inset 30px 0 50px -28px rgba(0,0,0,.20),   /* shadow at binding */
        inset 0 0 80px rgba(0,0,0,.04);
      overflow: hidden;
    }
    .book__face--recto {
      /* sits on the right, binding on the LEFT edge */
      transform: rotateY(0deg);
      box-shadow:
        inset 40px 0 50px -30px rgba(0,0,0,.22),
        inset 0 0 80px rgba(0,0,0,.04);
    }
    .book__face--verso {
      /* shows on the left after flip — binding now on the RIGHT edge */
      transform: rotateY(180deg);
      box-shadow:
        inset -40px 0 50px -30px rgba(0,0,0,.22),
        inset 0 0 80px rgba(0,0,0,.04);
    }

    /* Subtle drop shadow trailing the flipping leaf */
    .book__leaf.is-animating .book__face {
      box-shadow:
        inset 40px 0 60px -20px rgba(0,0,0,.30),
        inset 0 0 100px rgba(0,0,0,.08),
        0 0 40px rgba(0,0,0,.25);
    }

    /* Sheen: faint warm highlight that sweeps across the page during flip.
       Hidden by default, animated only when the parent leaf is mid-flip. */
    .book__sheen {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      background: linear-gradient(
        100deg,
        transparent 35%,
        rgba(255, 220, 160, .14) 50%,
        transparent 65%
      );
      mix-blend-mode: screen;
    }
    .book__leaf.is-animating .book__face--recto .book__sheen {
      animation: sheenSweep 1050ms cubic-bezier(.42, .08, .34, 1) forwards;
    }
    .book__leaf.is-animating .book__face--verso .book__sheen--verso {
      animation: sheenSweepVerso 1050ms cubic-bezier(.42, .08, .34, 1) forwards;
    }
    @keyframes sheenSweep {
      0%   { opacity: 0;  transform: translateX(-30%); }
      40%  { opacity: 1; }
      100% { opacity: 0;  transform: translateX(30%); }
    }
    @keyframes sheenSweepVerso {
      0%   { opacity: 0;  transform: translateX(30%); }
      40%  { opacity: .8; }
      100% { opacity: 0;  transform: translateX(-30%); }
    }

    /* Peel corner — initial visual hint */
    .book__peel {
      position: absolute;
      bottom: 0; right: 0;
      width: 70px; height: 70px;
      background: linear-gradient(
        135deg,
        transparent 0%,
        transparent 48%,
        rgba(0,0,0,.10) 50%,
        var(--page-bg) 52%,
        var(--page-bg) 100%
      );
      clip-path: polygon(100% 100%, 0% 100%, 100% 0%);
      box-shadow: -8px -8px 14px -6px rgba(0,0,0,.18);
      pointer-events: none;
      opacity: .9;
    }

    /* ─────────────────────────────────────────────────────────
       PAGE CONTENT (recto / verso / covers)
       ───────────────────────────────────────────────────────── */
    .page {
      width: 100%;
      height: 100%;
      color: var(--ink);
      font-family: var(--body-font);
      position: relative;
    }
    .page__inner {
      position: absolute;
      inset: 0;
      padding: 64px 60px 56px 60px;
      display: flex;
      flex-direction: column;
    }
    .page--recto .page__inner { padding-left: 84px; padding-right: 60px; }
    .page--verso .page__inner { padding-left: 60px; padding-right: 84px; }

    .page__header { margin-bottom: 22px; }
    .page__meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 12px;
    }
    .page__title {
      font-family: var(--display-font);
      font-weight: var(--display-weight, 400);
      font-style: var(--display-style, normal);
      font-size: var(--title-size, 38px);
      line-height: 1.05;
      letter-spacing: var(--title-tracking, -0.005em);
      margin: 0 0 8px 0;
      color: var(--ink-strong);
    }
    .page__author {
      font-family: var(--body-font);
      font-style: italic;
      font-size: 15px;
      color: var(--ink-soft);
      letter-spacing: .01em;
    }
    .page__rule {
      width: 38px;
      height: 1px;
      background: var(--ink-rule);
      margin: 24px 0 28px 0;
    }
    .page__poem {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    .page__line {
      margin: 0;
      font-size: 19px;
      line-height: 1.72;
      letter-spacing: .003em;
      color: var(--ink);
    }
    .page__line--break { height: 14px; }
    .page--dedication .page__inner {
      justify-content: center;
      align-items: flex-end;
      padding-right: 42px;
    }
    .dedication-note {
      width: 230px;
      margin-top: 32px;
      text-align: right;
      font-size: 13px;
      line-height: 1.65;
      color: var(--ink-soft);
    }
    .dedication-note p {
      margin: 0 0 10px;
    }
    .page__footer {
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .2em;
      color: var(--ink-faint);
    }
    .page__footer--verso { justify-content: flex-start; }
    .page__num { padding-top: 6px; }

    /* Verso page (echo of just-read poem) */
    .page--verso .page__inner {
      justify-content: center;
    }
    .page__verso-mark {
      text-align: right;
    }
    .page__verso-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 18px;
    }
    .page__verso-title {
      font-family: var(--display-font);
      font-style: var(--display-style, normal);
      font-weight: var(--display-weight, 400);
      font-size: 56px;
      line-height: 1.0;
      color: var(--ink-strong);
      letter-spacing: -0.01em;
      margin-bottom: 18px;
    }
    .page__verso-author {
      font-family: var(--body-font);
      font-style: italic;
      font-size: 16px;
      color: var(--ink-soft);
    }

    /* Inside-cover (title page) */
    .page--cover-front .page__inner {
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .cover-front__plate {
      padding: 48px 36px;
      max-width: 360px;
    }
    .cover-front__eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 28px;
    }
    .cover-front__title {
      font-family: var(--display-font);
      font-style: var(--display-style, normal);
      font-weight: var(--display-weight, 400);
      font-size: 84px;
      line-height: .95;
      color: var(--ink-strong);
      margin: 0;
      letter-spacing: -0.015em;
    }
    .cover-front__rule {
      width: 60px;
      height: 1px;
      background: var(--ink-rule);
      margin: 32px auto;
    }
    .cover-front__sub {
      font-family: var(--body-font);
      font-style: italic;
      font-size: 17px;
      color: var(--ink-soft);
      margin-bottom: 18px;
    }
    .cover-front__dedication {
      font-family: var(--body-font);
      font-size: 14px;
      color: var(--ink-faint);
      line-height: 1.6;
    }

    .page--cover-back .page__inner {
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .cover-back__mark {
      font-size: 28px;
      color: var(--ink-faint);
      margin-bottom: 32px;
    }
    .cover-back__fin {
      font-family: var(--display-font);
      font-style: italic;
      font-size: 44px;
      color: var(--ink-soft);
    }

    /* ─────────────────────────────────────────────────────────
       NAV + COUNTER
       ───────────────────────────────────────────────────────── */
    .book__nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid var(--nav-edge);
      background: var(--nav-bg);
      color: var(--nav-ink);
      font-size: 24px;
      line-height: 1;
      display: grid;
      place-items: center;
      cursor: pointer;
      z-index: 600;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: opacity .2s, transform .2s, background .2s;
      font-family: var(--display-font);
      padding-bottom: 4px;
    }
    .book__nav:hover { background: var(--nav-bg-hover); transform: translateY(-50%) scale(1.06); }
    .book__nav:disabled { opacity: .25; cursor: not-allowed; }
    .book__nav--prev { left: -76px; }
    .book__nav--next { right: -76px; }

    .book__counter {
      position: absolute;
      bottom: -52px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: .3em;
      color: var(--counter-ink);
      z-index: 600;
    }
    .book__counter span { opacity: .4; margin: 0 6px; }

    /* ─────────────────────────────────────────────────────────
       CANDLE (decoration) — same DOM in both, themed differently
       ───────────────────────────────────────────────────────── */
    .book__candle {
      position: absolute;
      z-index: 2;
      pointer-events: none;
      width: 0; height: 0;
    }
    .book__candle-glow {
      position: absolute;
      left: var(--candle-x, 8%);
      top: var(--candle-y, 18%);
      width: 600px; height: 600px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(
        circle,
        var(--candle-glow-color) 0%,
        transparent 60%
      );
      mix-blend-mode: screen;
      opacity: var(--candle-glow-opacity, .55);
      animation: candleFlicker 3.2s ease-in-out infinite;
    }
    .book__candle-stick,
    .book__candle-flame { display: none; } /* we keep DOM simple; glow only */

    @keyframes candleFlicker {
      0%, 100% { opacity: var(--candle-glow-opacity, .55); transform: translate(-50%, -50%) scale(1); }
      45%      { opacity: calc(var(--candle-glow-opacity, .55) * .85); transform: translate(-50%, -50%) scale(.97); }
      72%      { opacity: calc(var(--candle-glow-opacity, .55) * 1.05); transform: translate(-50%, -50%) scale(1.02); }
    }

    /* ─────────────────────────────────────────────────────────
       THEME 1 — BIBLIOTECA (leather library)
       ───────────────────────────────────────────────────────── */
    .book--biblioteca {
      --ambient: radial-gradient(
          ellipse 80% 60% at 30% 20%,
          oklch(28% 0.04 50) 0%,
          oklch(16% 0.025 40) 45%,
          oklch(10% 0.015 35) 100%
        );
      --cover-bg: linear-gradient(
        135deg,
        oklch(22% 0.05 30) 0%,
        oklch(18% 0.045 25) 50%,
        oklch(15% 0.04 25) 100%
      );
      --cover-edge: oklch(28% 0.05 30);
      --cover-emboss: rgba(180, 140, 90, .15);
      --cover-line: oklch(45% 0.06 50);

      --page-bg: #f3ead6;
      --page-tex:
        radial-gradient(ellipse 100% 70% at 50% 50%, transparent 60%, rgba(120, 90, 50, .06) 100%),
        repeating-linear-gradient(
          0deg,
          rgba(150, 120, 70, 0) 0px,
          rgba(150, 120, 70, 0) 3px,
          rgba(150, 120, 70, .012) 3px,
          rgba(150, 120, 70, .012) 4px
        );

      --ink: oklch(28% 0.025 50);
      --ink-strong: oklch(20% 0.03 40);
      --ink-soft: oklch(40% 0.03 50);
      --ink-faint: oklch(55% 0.02 50);
      --ink-rule: oklch(55% 0.04 50);

      --body-font: 'EB Garamond', Georgia, serif;
      --display-font: 'Cormorant Garamond', 'EB Garamond', serif;
      --display-weight: 400;
      --display-style: normal;
      --title-size: 40px;
      --title-tracking: -0.01em;

      --nav-bg: rgba(40, 28, 20, .55);
      --nav-bg-hover: rgba(60, 42, 28, .75);
      --nav-edge: rgba(200, 170, 120, .25);
      --nav-ink: oklch(78% 0.07 70);
      --counter-ink: oklch(55% 0.05 60);

      --candle-glow-color: oklch(60% 0.18 60 / .35);
      --candle-glow-opacity: .65;
      --candle-x: 22%;
      --candle-y: 30%;
    }

    /* ─────────────────────────────────────────────────────────
       THEME 2 — VELAS (candlelit midnight journal)
       ───────────────────────────────────────────────────────── */
    .book--velas {
      --ambient: radial-gradient(
          ellipse 70% 50% at 75% 80%,
          oklch(25% 0.05 50) 0%,
          oklch(12% 0.02 40) 50%,
          oklch(6% 0.01 30) 100%
        );
      --cover-bg: linear-gradient(
        135deg,
        oklch(16% 0.025 220) 0%,
        oklch(12% 0.02 230) 60%,
        oklch(9% 0.015 240) 100%
      );
      --cover-edge: oklch(20% 0.03 220);
      --cover-emboss: rgba(230, 200, 140, .10);
      --cover-line: oklch(38% 0.03 220);

      --page-bg: #ece1c6;
      --page-tex:
        radial-gradient(ellipse 100% 100% at 50% 50%, transparent 50%, rgba(110, 70, 30, .09) 100%),
        radial-gradient(circle at 20% 30%, rgba(160, 110, 60, .04), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(160, 110, 60, .04), transparent 40%);

      --ink: oklch(26% 0.03 40);
      --ink-strong: oklch(18% 0.04 30);
      --ink-soft: oklch(38% 0.035 40);
      --ink-faint: oklch(50% 0.03 40);
      --ink-rule: oklch(50% 0.05 40);

      --body-font: 'Lora', Georgia, serif;
      --display-font: 'Italianno', 'Cormorant Garamond', serif;
      --display-weight: 400;
      --display-style: normal;
      --title-size: 64px;
      --title-tracking: 0;

      --nav-bg: rgba(30, 22, 18, .55);
      --nav-bg-hover: rgba(80, 50, 30, .75);
      --nav-edge: rgba(240, 180, 110, .25);
      --nav-ink: oklch(85% 0.10 70);
      --counter-ink: oklch(60% 0.08 60);

      --candle-glow-color: oklch(72% 0.20 55 / .45);
      --candle-glow-opacity: .8;
      --candle-x: 82%;
      --candle-y: 78%;
    }
    /* second candle glow on the velas theme (upper-left, dimmer) */
    .book--velas::before {
      content: "";
      position: absolute;
      left: 12%; top: 18%;
      width: 380px; height: 380px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, oklch(68% 0.18 50 / .25), transparent 60%);
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 2;
      animation: candleFlicker 4.7s ease-in-out infinite;
    }

    /* Title page hierarchy tweak per theme (Italianno is huge) */
    .book--velas .cover-front__title { font-size: 110px; line-height: .9; }
    .book--velas .page__verso-title { font-size: 80px; line-height: .9; }

    /* On the velas theme, give recto titles a more script-y feel */
    .book--velas .page__title {
      font-family: 'Italianno', 'Cormorant Garamond', serif;
      font-size: 60px;
      line-height: .95;
    }
    .book--velas .page--long .page__inner,
    .book--velas .page--dense .page__inner {
      padding-top: 44px;
      padding-bottom: 40px;
    }
    .book--velas .page--long .page__header,
    .book--velas .page--dense .page__header {
      margin-bottom: 10px;
    }
    .book--velas .page--long .page__title {
      font-size: 48px;
    }
    .book--velas .page--long .page__rule,
    .book--velas .page--dense .page__rule {
      margin: 14px 0 16px;
    }
    .book--velas .page--long .page__line {
      font-size: 16px;
      line-height: 1.43;
    }
    .book--velas .page--dense .page__inner {
      padding-top: 34px;
      padding-bottom: 34px;
    }
    .book--velas .page--dense .page__title {
      font-size: 42px;
    }
    .book--velas .page--dense .page__line {
      font-size: 14px;
      line-height: 1.34;
    }
    .book--velas .page--long .page__line--break,
    .book--velas .page--dense .page__line--break {
      height: 8px;
    }
    /* Author still elegant */
    .book--velas .page__author { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 17px; }

    @media (max-width: 700px) {
      .book {
        --mobile-edge: 14px;
      }
      .book__nav {
        width: 38px;
        height: 38px;
      }
      .book__nav--prev { left: 18px; }
      .book__nav--next { right: 18px; }
      .book__counter {
        bottom: -36px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="poems.jsx?v=20260527-5"></script>
  <script type="text/babel" src="book.jsx?v=20260527-5"></script>
  <script type="text/babel">
    (() => {
    function App() {
      // Scale the book spread to fit the viewport while keeping internal
      // pixel-perfect typography. Reads viewport size on mount + resize and
      // sets a CSS var on the root.
      React.useEffect(() => {
        const update = () => {
          const viewport = window.visualViewport || window;
          const w = viewport.width || window.innerWidth;
          const h = viewport.height || window.innerHeight;
          const mobile = w < 700;
          const marginX = mobile ? 24 : 220; // desktop leaves room for outer arrows
          const marginY = mobile ? 86 : 140; // mobile browser bars need extra breathing room
          const scale = Math.min((w - marginX) / 1040, (h - marginY) / 680, 1);
          document.documentElement.style.setProperty('--book-scale', scale.toFixed(4));
        };
        update();
        window.addEventListener('resize', update);
        window.visualViewport?.addEventListener('resize', update);
        window.visualViewport?.addEventListener('scroll', update);
        return () => {
          window.removeEventListener('resize', update);
          window.visualViewport?.removeEventListener('resize', update);
          window.visualViewport?.removeEventListener('scroll', update);
        };
      }, []);

      return (
        <Book
          theme="velas"
          poems={[window.DEDICATION_PAGE, ...window.POEMS]}
          bookTitle="Rincón Literario"
          bookSubtitle="poesía de autor"
          dedication={`Léelo a media voz,\ncon una luz tibia.`}
        />
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    })();
  </script>
</body>
